name: Deploy Slidev deck

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drafts/2026-hardware-platform-configuration-managment-overview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install

      - name: Build Slidev deck
        run: bun run build

      - name: Assemble Pages site
        run: |
          rm -rf ../../public
          mkdir -p ../../public
          cp -R ../../site/. ../../public/
          mkdir -p ../../public/drafts/2026-hardware-platform-configuration-managment-overview
          cp -R dist/. ../../public/drafts/2026-hardware-platform-configuration-managment-overview/
          cp dist/404.html ../../public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
